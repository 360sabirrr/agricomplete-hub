services:
  - type: web
    name: agricomplete-backend
    env: python
    region: oregon
    plan: free
    buildCommand: cd agricomplete-hub/backend && pip install -r requirements.txt
    startCommand: cd agricomplete-hub/backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.0-flash,gemini-2.0-flash-lite
      - key: GEMINI_TIMEOUT_SECONDS
        value: "12"
      - key: WEATHERAPI_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
