services:
  - type: web
    name: agricomplete-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd agricomplete-hub/backend && pip install -r requirements.txt
    startCommand: cd agricomplete-hub/backend && gunicorn --workers 1 --timeout 300 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: agricomplete-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: "60"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/auto
      - key: OPENROUTER_FALLBACK_MODELS
        value: ""
      - key: OPENROUTER_TIMEOUT_SECONDS
        value: "24"
      - key: DISEASE_MODEL_PATH
        value: Models/crop_disease_model.keras
      - key: DISEASE_TFLITE_MODEL_PATH
        value: Models/crop_disease_model.tflite
      - key: DISEASE_CLASS_NAMES_PATH
        value: ML/class_names.json
      - key: DISEASE_TREATMENTS_PATH
        value: recommendations/treatments.json
      - key: DISEASE_PRELOAD_MODEL
        value: "true"
      - key: DISEASE_BACKGROUND_WARMUP
        value: "false"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: TF_NUM_INTRAOP_THREADS
        value: "1"
      - key: TF_NUM_INTEROP_THREADS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: CUDA_VISIBLE_DEVICES
        value: "-1"
      - key: WEATHERAPI_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: MAILTRAP_API_TOKEN
        sync: false
      - key: MAILTRAP_FROM_EMAIL
        value: hello@demomailtrap.co
      - key: MAILTRAP_FROM_NAME
        value: AgriComplete Hub
      - key: PASSWORD_RESET_TOKEN_MINUTES
        value: "15"
      - key: PASSWORD_RESET_RESEND_SECONDS
        value: "60"
      - key: PASSWORD_RESET_MAX_REQUESTS_PER_HOUR
        value: "5"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"

databases:
  - name: agricomplete-db
    region: oregon
    plan: free
    databaseName: agricomplete
    user: agricomplete
