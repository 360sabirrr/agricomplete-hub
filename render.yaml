services:
  - type: web
    name: agricomplete-backend
    env: python
    region: oregon
    plan: free
    buildCommand: cd agricomplete-hub/backend && pip install -r requirements.txt
    startCommand: cd agricomplete-hub/backend && gunicorn --workers 1 --threads 2 --timeout 300 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/auto
      - key: OPENROUTER_FALLBACK_MODELS
        value: ""
      - key: OPENROUTER_TIMEOUT_SECONDS
        value: "24"
      - key: DISEASE_MODEL_PATH
        value: Models/crop_disease_model.keras
      - key: DISEASE_CLASS_NAMES_PATH
        value: ML/class_names.json
      - key: DISEASE_TREATMENTS_PATH
        value: recommendations/treatments.json
      - key: DISEASE_PRELOAD_MODEL
        value: "true"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: WEATHERAPI_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
